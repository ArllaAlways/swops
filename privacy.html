<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>SWOPS - Privacy</title>
  <style>
    @font-face {
      font-family: 'Alfredino';
      src: url('SITE%20ASSETS/FONT/alfredino-semimono-font/alfredinosemirounded-semirounded.ttf') format('truetype');
      font-weight: 400;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: #000; }
    body { font-family: 'Alfredino', sans-serif; background: #000; }

    .nav { position: fixed; top: 0; right: 0; z-index: 1000; padding: 18px 24px; }
    .nav__back { font-family: 'Alfredino', sans-serif; font-size: clamp(13px, 1.1vw, 17px); color: #C8FF00; text-decoration: none; letter-spacing: 0.06em; opacity: 0.7; }
    .nav__back:hover { opacity: 1; }

    .privacy { width: 100%; max-width: 860px; margin: 0 auto; padding: clamp(80px, 12vw, 160px) clamp(28px, 6vw, 60px); display: flex; flex-direction: column; gap: 40px; }
    .privacy__heading { font-family: 'Alfredino', sans-serif; font-size: clamp(13px, 1vw, 16px); color: #C8FF00; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.5; }
    .privacy__body { font-family: 'Alfredino', sans-serif; font-size: clamp(20px, 2.4vw, 34px); color: #C8FF00; line-height: 1.5; }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav__back" href="index.html">← Back</a>
  </nav>

  <main class="privacy">
    <p class="privacy__heading">Privacy</p>
    <p class="privacy__body">Swops collects your name, email, suburb and basic information about your home for the purpose of private matching. This information is never shared publicly, never sold and is only used to facilitate introductions between registered swoppers.</p>
  </main>

</body>
</html>
